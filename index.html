<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvioQuiz | Havacılık Teknik Testi</title>
    <style>
        :root {
            --primary: #1a73e8;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .quiz-container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
            transform: translateY(0);
            transition: all 0.3s ease;
            border-top: 5px solid var(--primary);
        }

        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-bottom: 1rem; }
        
        #question-counter { font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px; }

        .question-text {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: #334155;
            border: 2px solid transparent;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s ease;
            outline: none;
        }

        .option-btn:hover { background: #475569; }

        .correct { 
            background-color: var(--success) !important; 
            border-color: #1b7e45;
            animation: pulse 0.4s;
        }

        .wrong { 
            background-color: var(--error) !important; 
            border-color: #a93226;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        #next-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        .result-screen { text-align: center; display: none; }
        
        .progress-bar {
            height: 8px;
            background: #334155;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz">
    <div id="game-area">
        <h1>AVIOQUIZ PRO</h1>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="question-counter">Soru: 1 / 150</div>
        <div class="question-text" id="question">Soru yükleniyor...</div>
        <div class="options-grid" id="options">
            </div>
        <button id="next-btn" onclick="loadNextQuestion()">Sonraki Soruya Geç</button>
    </div>

    <div class="result-screen" id="result-area">
        <h2>Sınav Tamamlandı!</h2>
        <p id="score-text"></p>
        <button class="option-btn" onclick="location.reload()" style="text-align:center; width:100%">Yeniden Başlat</button>
    </div>
</div>

    let currentQuestionIndex = 0;
    let score = 0;
    let canClick = true;

    function loadQuestion() {
        canClick = true;
        const qData = questionBank[currentQuestionIndex];
        document.getElementById("question").innerText = qData.q;
        document.getElementById("question-counter").innerText = `Soru: ${currentQuestionIndex + 1} / 150`;
        document.getElementById("next-btn").style.display = "none";
        
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        
        const keys = ['a', 'b', 'c', 'd'];
        keys.forEach(key => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = qData[key];
            btn.onclick = () => checkAnswer(btn, key);
            optionsDiv.appendChild(btn);
        });

        document.getElementById("progress-fill").style.width = `${((currentQuestionIndex) / 150) * 100}%`;
    }

    function checkAnswer(btn, choice) {
        if(!canClick) return;
        canClick = false;
        
        const correctChoice = questionBank[currentQuestionIndex].correct;
        const allButtons = document.querySelectorAll(".option-btn");

        if(choice === correctChoice) {
            btn.classList.add("correct");
            score++;
        } else {
            btn.classList.add("wrong");
            // Doğru olanı da göster
            allButtons.forEach(b => {
                // Basit bir eşleştirme mantığı
                if(b.innerText === questionBank[currentQuestionIndex][correctChoice]) {
                    b.classList.add("correct");
                }
            });
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function loadNextQuestion() {
        currentQuestionIndex++;
        if(currentQuestionIndex < questionBank.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }
// ... loadNextQuestion ve showResult fonksiyonlarının bittiği yer ...

    // --- BURAYA EKLE ---
    function shuffleQuestions(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    shuffleQuestions(questionBank); // Bankadaki 100 soruyu karıştırır
    // -------------------

    loadQuestion(); // Karışmış olan ilk soruyu yükler
</script>
