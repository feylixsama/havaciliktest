<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvioQuiz | Havacılık Teknik Testi</title>
    <style>
        :root {
            --primary: #1a73e8;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .quiz-container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
            transform: translateY(0);
            transition: all 0.3s ease;
            border-top: 5px solid var(--primary);
        }

        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-bottom: 1rem; }
        
        #question-counter { font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px; }

        .question-text {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: #334155;
            border: 2px solid transparent;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s ease;
            outline: none;
        }

        .option-btn:hover { background: #475569; }

        .correct { 
            background-color: var(--success) !important; 
            border-color: #1b7e45;
            animation: pulse 0.4s;
        }

        .wrong { 
            background-color: var(--error) !important; 
            border-color: #a93226;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        #next-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        .result-screen { text-align: center; display: none; }
        
        .progress-bar {
            height: 8px;
            background: #334155;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
<audio id="bgMusic" loop>
    <source src="muzik.mp3" type="audio/mpeg">
</audio>
<div class="quiz-container" id="quiz">
    <div id="game-area">

        <div class="options-grid" id="options">
            </div>
<div style="display: flex; gap: 10px; margin-top: 20px; height: 55px; overflow: hidden;">
    <button id="prev-btn" onclick="loadPrevQuestion()" style="flex: 1; padding: 12px; background: #475569; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; font-size: 16px; visibility: hidden;">Önceki Soru</button>
    
    <button id="next-btn" onclick="loadNextQuestion()" style="flex: 1; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: none; font-size: 16px; width: 100%;">Sonraki Soruya Geç</button>
</div>

</div>

let plateScore = 0;
let currentPlateIndex = 0;

function toggleGame() {

function loadPlateQuestion() {
    canClick = true;
    const currentCity = cityData[currentPlateIndex];
    
    // Arayüzü güncelle (Havacılık testiyle aynı ID'leri kullanıyoruz)
    document.getElementById("question").innerText = `${currentCity.n} ilinin plaka kodu nedir?`;
    document.getElementById("question-counter").innerText = `Soru: ${currentPlateIndex + 1} / 81 | Puan: ${plateScore}`;
    
    // Şıkları hazırla (1 doğru, 3 rastgele yanlış)
    let options = [currentCity.p];
    while(options.length < 4) {
        let randomPlate = Math.floor(Math.random() * 81 + 1).toString().padStart(2, '0');
        if(!options.includes(randomPlate)) options.push(randomPlate);
    }
    options.sort(() => Math.random() - 0.5);

    // Butonları oluştur
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = opt;
        btn.onclick = () => checkPlateAnswer(btn, opt, currentCity.p);
        optionsDiv.appendChild(btn);
    });
    
    document.getElementById("next-btn").style.display = "none";
    
    // Progress bar güncelleme
    const progress = ((currentPlateIndex + 1) / 81) * 100;
    document.getElementById("progress-fill").style.width = progress + "%";
}

function checkPlateAnswer(btn, choice, correct) {
    if(!canClick) return;
    canClick = false;

    if(choice === correct) {
        btn.classList.add("correct");
        plateScore += 10;
    } else {
        btn.classList.add("wrong");
        plateScore = Math.max(0, plateScore - 5);
        // Doğru şıkkı yeşil yap
        Array.from(document.querySelectorAll(".option-btn")).forEach(b => {
            if(b.innerText === correct) b.classList.add("correct");
        });
    }

    // Skor göstergesini anlık güncelle
    document.getElementById("question-counter").innerText = `Soru: ${currentPlateIndex + 1} / 81 | Puan: ${plateScore}`;

    const nextBtn = document.getElementById("next-btn");
    nextBtn.style.display = "block";
    nextBtn.innerText = "Sonraki İle Geç";
    nextBtn.onclick = () => {
        currentPlateIndex++;
        if(currentPlateIndex < 81) {
            loadPlateQuestion();
        } else {
            alert(`Oyun Bitti! Toplam Puanın: ${plateScore}`);
            location.reload();
        }
    };
}
